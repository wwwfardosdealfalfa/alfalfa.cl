<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrocomercial Chicureo - Fardos de Alfalfa Premium</title>
    <style>
        /* Variables de Color */
        :root {
            --primary: #1e4620;       
            --primary-light: #f0f7f2; 
            --accent: #e5a93b;        
            --dark: #231f1a;          
            --light: #faf9f6;         
            --white: #ffffff;
            --shadow: rgba(0, 0, 0, 0.08);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--light);
            color: var(--dark);
            line-height: 1.6;
        }

        /* Barra de Navegación */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
        }

        .logo-icon {
            width: 45px;
            height: 45px;
            fill: var(--primary);
        }

        .logo-text h1 {
            font-size: 1.3rem;
            color: var(--primary);
            font-weight: 800;
            line-height: 1.1;
        }

        .logo-text p {
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        nav a:hover { color: var(--primary); }

        .contact-btn-top {
            background-color: var(--primary);
            color: var(--white);
            text-decoration: none;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .contact-btn-top:hover {
            background-color: #132d15;
            transform: translateY(-2px);
        }

        /* Hero Slider - Fondo con Imágenes que pasan automáticamente */
        .hero-slider {
            position: relative;
            height: 80vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--white);
            text-align: center;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
        }

        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(30, 70, 32, 0.7), rgba(35, 31, 26, 0.8));
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
            padding: 0 2rem;
        }

        .hero h2 {
            font-size: 3.2rem;
            margin-bottom: 1.2rem;
            line-height: 1.1;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            color: #e3e8e4;
        }

        .btn-primary {
            background-color: var(--accent);
            color: var(--dark);
            text-decoration: none;
            padding: 1.1rem 2.5rem;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 20px rgba(229, 169, 59, 0.4);
            transition: var(--transition);
            display: inline-block;
        }

        .btn-primary:hover {
            background-color: #d1952e;
            transform: translateY(-3px);
        }

        /* Secciones Generales */
        section { padding: 5rem 2rem; }
        .section-container { max-width: 1200px; margin: 0 auto; }
        .section-title {
            font-size: 2.2rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 3.5rem;
            font-weight: 800;
            position: relative;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 4px;
            background-color: var(--accent);
            border-radius: 2px;
        }

        /* Sección Quiénes Somos */
        .about-section { background-color: var(--white); }
        .about-grid { display: flex; flex-wrap: wrap; gap: 2.5rem; align-items: center; }
        .about-main-text { flex: 1 1 500px; font-size: 1.1rem; color: #4a453f; }
        .about-main-text p { margin-bottom: 1.5rem; }
        .mv-cards { display: flex; flex-wrap: wrap; gap: 1.5rem; width: 100%; }
        .mv-card { background: var(--primary-light); padding: 2rem; border-radius: 12px; flex: 1 1 450px; border-left: 5px solid var(--primary); }
        .mv-card h3 { color: var(--primary); font-size: 1.4rem; margin-bottom: 0.8rem; }

        /* Tarjetas de Características */
        .features-grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; }
        .feature-card {
            background: var(--white);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            flex: 1 1 300px;
            max-width: 360px;
            text-align: center;
            transition: var(--transition);
            border: 1px solid rgba(0,0,0,0.02);
        }
        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(30, 70, 32, 0.08);
            border-color: rgba(30, 70, 32, 0.1);
        }
        .feature-icon { font-size: 3rem; margin-bottom: 1.5rem; }
        .feature-card h3 { color: var(--primary); margin-bottom: 1rem; }

        /* Catálogo */
        .products { background-color: var(--primary-light); }
        .products-grid { display: flex; flex-wrap: wrap; gap: 2.5rem; justify-content: center; }
        .product-card {
            background: var(--white);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            flex: 1 1 320px;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }
        .product-card:hover { transform: scale(1.03); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .product-img { height: 220px; background-size: cover; background-position: center; position: relative; }
        .product-tag { position: absolute; top: 15px; left: 15px; background-color: var(--primary); color: var(--white); font-size: 0.75rem; font-weight: 700; padding: 0.4rem 0.8rem; border-radius: 20px; }
        .product-info { padding: 2rem; display: flex; flex-direction: column; flex-grow: 1; }
        .product-info h3 { color: var(--primary); margin-bottom: 0.8rem; }
        .product-info p { font-size: 0.95rem; color: #5a554f; margin-bottom: 1.5rem; flex-grow: 1; }

        /* Canales de Contacto, Formulario y GPS */
        .contact-section { background-color: var(--white); }
        .contact-grid { display: flex; flex-wrap: wrap; gap: 3rem; }
        .contact-form-block { flex: 1 1 500px; }
        .contact-form { background-color: var(--light); padding: 2.5rem; border-radius: 16px; box-shadow: 0 4px 15px var(--shadow); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; background-color: var(--white); }
        .btn-submit { background-color: var(--primary); color: var(--white); border: none; padding: 1rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; transition: var(--transition); }
        .btn-submit:hover { background-color: #132d15; }
        .contact-info-block { flex: 1 1 500px; display: flex; flex-direction: column; gap: 2rem; }
        .info-details { background-color: var(--primary-light); padding: 2rem; border-radius: 16px; }
        .info-details h3 { color: var(--primary); margin-bottom: 1.2rem; }
